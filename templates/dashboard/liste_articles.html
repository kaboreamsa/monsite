{% extends 'dashboard/base_dashboard.html' %}
{% block title %}Articles{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center">
    <h1>Articles</h1>
    <a href="{% url 'dashboard:ajouter_article' %}" class="btn btn-success">+ Nouvel article</a>
</div>
<table class="table table-striped mt-3">
    <thead>
        <tr><th>Titre</th><th>Date</th><th>Actions</th></tr>
    </thead>
    <tbody>
        {% for article in articles %}
        <tr>
            <td>{{ article.titre }}</td>
            <td>{{ article.date_publication|date:"d/m/Y" }}</td>
            <td>
                <a href="{% url 'dashboard:modifier_article' article.pk %}" class="btn btn-sm btn-warning">Modifier</a>
                <a href="{% url 'dashboard:supprimer_article' article.pk %}" class="btn btn-sm btn-danger">Supprimer</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
